<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="640" height="200">
  <defs>
    <!-- Blue gradient for accent elements -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter for chart bars -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2563EB" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" fill="#0A0F1E" rx="10"/>

  <!-- ── ICON: mini candlestick chart in a square ── -->
  <!-- Icon background panel -->
  <rect x="12" y="12" width="72" height="76" rx="8" fill="#131929" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Subtle grid lines -->
  <line x1="16" y1="35" x2="80" y2="35" stroke="#1E3A5F" stroke-width="0.5"/>
  <line x1="16" y1="55" x2="80" y2="55" stroke="#1E3A5F" stroke-width="0.5"/>
  <line x1="16" y1="75" x2="80" y2="75" stroke="#1E3A5F" stroke-width="0.5"/>

  <!-- Candlestick 1 — bearish (red) -->
  <line x1="26" y1="28" x2="26" y2="72" stroke="#EF4444" stroke-width="1" opacity="0.6"/>
  <rect x="22" y="38" width="8" height="22" rx="1" fill="#EF4444" opacity="0.85"/>

  <!-- Candlestick 2 — bullish (green) -->
  <line x1="42" y1="24" x2="42" y2="68" stroke="#22C55E" stroke-width="1" opacity="0.6"/>
  <rect x="38" y="32" width="8" height="22" rx="1" fill="#22C55E" opacity="0.85"/>

  <!-- Candlestick 3 — bullish (green) -->
  <line x1="58" y1="18" x2="58" y2="60" stroke="#22C55E" stroke-width="1" opacity="0.6"/>
  <rect x="54" y="24" width="8" height="20" rx="1" fill="#22C55E" opacity="0.85"/>

  <!-- Candlestick 4 — bullish (green, tall) -->
  <line x1="74" y1="14" x2="74" y2="55" stroke="#38BDF8" stroke-width="1" opacity="0.6"/>
  <rect x="70" y="18" width="8" height="22" rx="1" fill="url(#blueGrad)" filter="url(#glow)"/>

  <!-- Trend arrow up-right overlay -->
  <polyline points="22,70 38,54 54,46 70,28" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ── WORDMARK ── -->
  <!-- "Market" -->
  <text
    x="96" y="48"
    font-family="'Inter', 'DM Sans', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#F8FAFC"
    letter-spacing="-0.5"
  >Market</text>

  <!-- "Pulse" in gradient blue -->
  <text
    x="96" y="76"
    font-family="'Inter', 'DM Sans', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    fill="url(#blueGrad)"
    letter-spacing="-0.5"
  >Pulse</text>

  <!-- "INDIA" small label -->
  <text
    x="98" y="92"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="8"
    font-weight="500"
    fill="#94A3B8"
    letter-spacing="4"
  >INDIA</text>

  <!-- Thin accent divider between icon and text -->
  <line x1="88" y1="16" x2="88" y2="84" stroke="#1E3A5F" stroke-width="1"/>
</svg>
